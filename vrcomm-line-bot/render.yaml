services:
  - type: web
    name: vrcomm-line-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: EXPORT_PASSWORD
        sync: false
      - key: DB_PATH
        value: /tmp/vrcomm_line_messages.db
      - key: EXPORT_PATH
        value: /tmp/line_messages_export.xlsx
      - key: PYTHON_VERSION
        value: "3.11.0"
